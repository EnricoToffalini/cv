skills:
  - id: "r"
    name_original: "R / RStudio"
    level:
      it: "avanzato"
      en: "advanced"
    description:
      it: "Gestione e visualizzazione dei dati; modelli lineari, generalizzati e a effetti misti; SEM; simulazione; meta-analisi; metodi bayesiani e design analysis. Pacchetti dichiarati: lavaan, lme4, glmmTMB, blavaan, brms, ggplot2, ordinal, shiny, metafor, semTools, mclust, BayesFactor."
      en: "Data management and visualization; linear, generalized, and mixed-effects models; SEM; simulation; meta-analysis; Bayesian methods; and design analysis. Reported packages: lavaan, lme4, glmmTMB, blavaan, brms, ggplot2, ordinal, shiny, metafor, semTools, mclust, BayesFactor."
    source_page: 19
  - id: "python"
    name_original: "Python"
    level:
      it: "conoscenza applicata"
      en: "applied proficiency"
    description:
      it: "Gestione e visualizzazione dei dati, analisi statistica e basi di natural language processing con embeddings e modelli pre-trained tramite HuggingFace. Pacchetti dichiarati: numpy, pandas, seaborn, statsmodels, transformers. Uso tramite Colab, Spyder e RStudio."
      en: "Data management and visualization, statistical analysis, and foundational natural language processing with embeddings and pretrained models through HuggingFace. Reported packages: numpy, pandas, seaborn, statsmodels, transformers. Used through Colab, Spyder, and RStudio."
    source_page: 19
  - id: "quarto"
    name_original: "Quarto"
    level:
      it: "uso operativo"
      en: "working proficiency"
    description:
      it: "Generazione di siti, presentazioni e slideshow mediante il sistema di pubblicazione open source Quarto."
      en: "Creation of websites, presentations, and slideshows with the open-source Quarto publishing system."
    source_page: 19
  - id: "github"
    name_original: "GitHub"
    level:
      it: "base"
      en: "basic"
    description:
      it: "Repository per open code e open data e hosting di siti e pagine web."
      en: "Repositories for open code and open data, and hosting of websites and web pages."
    source_page: 19

